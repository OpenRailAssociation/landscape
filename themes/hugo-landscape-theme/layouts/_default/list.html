{{ define "main" }}
  <h1>{{ .Title }}</h1>
  {{ .Content }}
  <div class="project-grid">
    {{ range sort .Pages "Title" }}
      <article class="project-card">
        <h2><a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a></h2>
        <p>{{ .Summary }}</p>
      </article>
    {{ end }}
  </div>
{{ end }}
